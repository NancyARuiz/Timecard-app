<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Uploader Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-cyan-600 mb-2">
            Timeline Uploader
        </h1>
        <p class="text-slate-500 mb-8">Add a new historical memory directly to the Raspberry Pi display terminal.</p>

        <form id="uploadForm" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Date (e.g., 1995-05-12)</label>
                <input type="text" id="event_date" required class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="YYYY-MM-DD">
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Title</label>
                <input type="text" id="title" required class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="Born in Paris...">
            </div>
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Image</label>
                <input type="file" id="image_file" accept="image/*" required class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-cyan-500 outline-none transition-all file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100">
            </div>
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Description</label>
                <textarea id="description" required class="px-4 py-2 border border-slate-300 rounded-lg h-32 focus:ring-2 focus:ring-cyan-500 outline-none transition-all resize-none" placeholder="A short story about this moment..."></textarea>
            </div>
            
            <button type="submit" id="submitBtn" class="mt-4 bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white py-3 px-6 rounded-lg font-bold transition-all shadow-md active:scale-95 text-lg">
                Send to Display!
            </button>
        </form>

        <div id="successMsg" class="hidden mt-6 p-4 bg-green-100 text-green-800 rounded-lg border border-green-200 font-medium text-center">
            Memory successfully added! The display will update momentarily.
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('successMsg');
            
            btn.innerText = 'Sending...';
            btn.disabled = true;

            const fileInput = document.getElementById('image_file');
            const file = fileInput.files[0];
            
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64String = reader.result;
                const payload = {
                    event_date: document.getElementById('event_date').value,
                    title: document.getElementById('title').value,
                    image_url: base64String,
                    description: document.getElementById('description').value,
                };

                try {
                    const response = await fetch('/api/events', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        document.getElementById('uploadForm').reset();
                        msg.classList.remove('hidden');
                        setTimeout(() => msg.classList.add('hidden'), 5000);
                    } else {
                        alert('Error adding memory.');
                    }
                } catch (err) {
                    alert('Network error: ' + err.message);
                } finally {
                    btn.innerText = 'Send to Display!';
                    btn.disabled = false;
                }
            };
            
            if (file) {
                reader.readAsDataURL(file);
            } else {
                btn.innerText = 'Send to Display!';
                btn.disabled = false;
                alert('Please select an image file.');
            }
        });
    </script>
</body>
</html>
