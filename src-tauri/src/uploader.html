<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timecard Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 flex flex-col items-center">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-cyan-600 mb-8 text-center">
            Timecard
        </h1>

        <!-- Step 0: Welcome -->
        <div id="step-0" class="step active flex-col w-full text-center items-center gap-6">
            <p class="text-slate-500 text-lg">Welcome to the Timecard portal. Begin by setting up an account to add your memories to the main display.</p>
            <button onclick="nextStep(1)" class="w-full bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white shadow-lg py-4 rounded-xl font-bold transition-all text-xl active:scale-95">
                Add a Memory
            </button>
        </div>

        <!-- Step 1: Create Account -->
        <form id="step-1" class="step flex-col w-full gap-5">
            <h2 class="text-2xl font-bold text-slate-800 text-center mb-2">Create Account</h2>
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Email</label>
                <input type="email" id="acc_email" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Birthdate</label>
                <input type="text" id="acc_birth" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="YYYY-MM-DD">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Password</label>
                <input type="password" id="acc_pass" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all">
            </div>
            
            <button type="submit" id="btn-submit-1" class="mt-4 bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold transition-all shadow-md active:scale-95 text-lg">
                Continue
            </button>
        </form>

        <!-- Step 2: Person Details -->
        <form id="step-2" class="step flex-col w-full gap-5">
            <h2 class="text-2xl font-bold text-slate-800 text-center mb-2">Who is in the photos?</h2>
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Full Name</label>
                <input type="text" id="per_name" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="John Doe">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Birth Date</label>
                <input type="text" id="per_birth" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="YYYY-MM-DD">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Resting Date (Optional)</label>
                <input type="text" id="per_death" class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="YYYY-MM-DD or Present">
            </div>
            
            <button type="submit" id="btn-submit-2" class="mt-4 bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold transition-all shadow-md active:scale-95 text-lg">
                Continue
            </button>
        </form>

        <!-- Step 3: Select Photos -->
        <form id="step-3" class="step flex-col w-full gap-5">
            <h2 class="text-2xl font-bold text-slate-800 text-center mb-2">Upload Memories</h2>
            <p class="text-slate-500 text-center text-sm mb-2">Select one or multiple photos to add to the timeline.</p>
            
            <div class="flex flex-col gap-1">
                <input type="file" id="mem_files" accept="image/*" multiple required class="px-4 py-8 bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100 cursor-pointer w-full text-center">
            </div>
            
            <button type="submit" id="btn-submit-3" class="mt-4 bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-bold transition-all shadow-md active:scale-95 text-lg">
                Continue to Details
            </button>
        </form>

        <!-- Step 4: Queue Metadata -->
        <form id="step-4" class="step flex-col w-full gap-5">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-2xl font-bold text-slate-800">Photo Details</h2>
                <span id="queue_counter" class="bg-cyan-100 text-cyan-800 text-sm font-bold px-3 py-1 rounded-full">1 of 1</span>
            </div>
            
            <div class="flex justify-center w-full bg-slate-100 rounded-xl p-2 h-40">
                <img id="queue_preview" class="h-full object-contain rounded-lg shadow-sm" src="" alt="Preview">
            </div>
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Date of Photo</label>
                <input type="text" id="queue_date" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="YYYY-MM-DD">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Title</label>
                <input type="text" id="queue_title" required class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="e.g. Tummy Time">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-slate-700">Description (Optional)</label>
                <textarea id="queue_desc" rows="2" class="px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition-all" placeholder="Write a small memory here..."></textarea>
            </div>
            
            <button type="submit" id="btn-submit-4" class="mt-4 bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600 text-white shadow-lg py-3 rounded-xl font-bold transition-all active:scale-95 text-lg">
                Upload & Next
            </button>
        </form>

        <!-- Step 5: Success -->
        <div id="step-5" class="step flex-col w-full text-center items-center gap-6 py-8">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mb-4">✓</div>
            <h2 class="text-3xl font-black text-slate-800">Done!</h2>
            <p class="text-slate-500 text-lg">The Timecard display is updating now.</p>
            
            <button type="button" onclick="nextStep(3)" class="mt-4 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-4 rounded-xl font-bold transition-all shadow-sm active:scale-95 text-lg border border-slate-200">
                Upload More Photos
            </button>
        </div>
    </div>

    <script>
        let GLOBAL_ACCOUNT_ID = null;
        let GLOBAL_PERSON_ID = null;
        
        let QUEUE_FILES = [];
        let QUEUE_INDEX = 0;

        function nextStep(stepNum) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step-' + stepNum).classList.add('active');
        }

        // STEP 1: CREATE ACCOUNT
        document.getElementById('step-1').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-1');
            btn.innerText = 'Creating...'; btn.disabled = true;

            const payload = {
                email: document.getElementById('acc_email').value,
                birthdate: document.getElementById('acc_birth').value,
                password: document.getElementById('acc_pass').value
            };

            try {
                const res = await fetch('/api/accounts', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    GLOBAL_ACCOUNT_ID = await res.json();
                    nextStep(2);
                } else {
                    alert('Failed to create account.');
                }
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = 'Continue'; btn.disabled = false;
            }
        });

        // STEP 2: CREATE PERSON
        document.getElementById('step-2').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-2');
            btn.innerText = 'Saving...'; btn.disabled = true;

            const payload = {
                account_id: GLOBAL_ACCOUNT_ID,
                name: document.getElementById('per_name').value,
                birth_date: document.getElementById('per_birth').value,
                dead_date: document.getElementById('per_death').value || "Present"
            };

            try {
                const res = await fetch('/api/people', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    GLOBAL_PERSON_ID = await res.json();
                    nextStep(3);
                } else {
                    alert('Failed to create person.');
                }
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = 'Continue'; btn.disabled = false;
            }
        });

        // STEP 3: PREPARE QUEUE
        document.getElementById('step-3').addEventListener('submit', (e) => {
            e.preventDefault();
            const files = document.getElementById('mem_files').files;
            if (files.length === 0) return;
            
            QUEUE_FILES = Array.from(files);
            QUEUE_INDEX = 0;
            loadQueueItem();
            nextStep(4);
        });

        function loadQueueItem() {
            if (QUEUE_INDEX >= QUEUE_FILES.length) {
                // Done with Queue
                nextStep(5);
                document.getElementById('mem_files').value = "";
                return;
            }

            const file = QUEUE_FILES[QUEUE_INDEX];
            document.getElementById('queue_counter').innerText = `${QUEUE_INDEX + 1} of ${QUEUE_FILES.length}`;
            
            // Clear inputs for the new photo
            document.getElementById('queue_date').value = "";
            document.getElementById('queue_title').value = "";
            document.getElementById('queue_desc').value = "";

            // Change button text intelligently
            const btn = document.getElementById('btn-submit-4');
            if (QUEUE_INDEX === QUEUE_FILES.length - 1) {
                btn.innerText = "Complete Setup";
                if (QUEUE_FILES.length > 1) btn.innerText = "Finish Uploading";
            } else {
                btn.innerText = "Upload & Next Photo";
            }

            // Show local preview
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('queue_preview').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // STEP 4: UPLOAD SINGLE QUEUE ITEM
        document.getElementById('step-4').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-4');
            btn.disabled = true;
            const originalText = btn.innerText;
            btn.innerText = "Uploading...";

            const file = QUEUE_FILES[QUEUE_INDEX];
            const reader = new FileReader();

            reader.onloadend = async () => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const MAX = 1920;
                    if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } } 
                    else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const descVal = document.getElementById('queue_desc').value;
                    const titleVal = document.getElementById('queue_title').value;

                    const payload = {
                        person_id: GLOBAL_PERSON_ID,
                        event_date: document.getElementById('queue_date').value,
                        title: titleVal,
                        description: descVal.trim() === "" ? titleVal : descVal,
                        image_url: canvas.toDataURL('image/jpeg', 0.8)
                    };

                    try {
                        const res = await fetch('/api/events', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (res.ok) {
                            QUEUE_INDEX++;
                            loadQueueItem();
                        } else {
                            alert('Upload failed.');
                        }
                    } catch (err) {
                        alert(err.message);
                    } finally {
                        btn.innerText = originalText; 
                        btn.disabled = false;
                    }
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
