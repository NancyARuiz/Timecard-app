name: Build for Raspberry Pi

on:
  push:
    tags:
      - "v*"           # triggers when you push a tag like: git tag v1.0 && git push --tags
  workflow_dispatch:   # also lets you trigger it manually from the GitHub website

jobs:
  build-pi:
    name: Build Linux ARM64 (.deb for Raspberry Pi)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Download the repo code ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Install all the native Linux libraries Tauri needs ────────────────
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      # ── 3. Install Rust and add the ARM64 Linux target ───────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      # ── 4. Cache compiled Rust dependencies (makes future builds faster) ─────
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── 5. Install Node.js (to compile the React frontend) ───────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── 6. Install pnpm ───────────────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # ── 7. Cache pnpm modules (makes future builds faster) ───────────────────
      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── 8. Install JavaScript dependencies ───────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install

      # ── 9. Build the Tauri app for Raspberry Pi (ARM64 Linux) ────────────────
      - name: Build Tauri app for ARM64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell the Rust linker to use the ARM64 cross-compiler
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Timeline Kiosk ${{ github.ref_name }}"
          releaseBody: |
            ## Timeline Kiosk Release ${{ github.ref_name }}

            ### Install on Raspberry Pi
            1. Download the `.deb` file below
            2. Open a terminal on your Pi and run:
            ```bash
            sudo dpkg -i timeline-app_*.deb
            ```
            3. Launch the app with:
            ```bash
            timeline-app
            ```
          releaseDraft: false
          prerelease: false
          args: --target aarch64-unknown-linux-gnu --bundles deb
